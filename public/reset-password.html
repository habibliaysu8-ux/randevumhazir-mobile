<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Şifre Yenile - Randevumhazır</title>
  <style>
    :root{--bg:#f7f3fb;--text:#15111c;--muted:#716b7a;--accent:#6f5ee8;--border:rgba(21,15,29,.12)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#efeaff,#fff6fb);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);padding:22px}.card{width:min(430px,100%);background:#fff;border:1px solid var(--border);border-radius:28px;padding:26px;box-shadow:0 24px 70px rgba(40,24,58,.12)}h1{font-family:Georgia,"Times New Roman",serif;letter-spacing:-.05em;margin:0 0 8px;font-size:2.2rem}p{color:var(--muted);line-height:1.5}input{width:100%;border:1px solid var(--border);border-radius:18px;padding:14px;margin:8px 0;font:inherit}button{width:100%;border:0;border-radius:999px;background:#111;color:#fff;font-weight:800;padding:15px;margin-top:10px;cursor:pointer}.msg{min-height:24px;margin-top:12px;font-weight:700}.ok{color:#1f7a45}.err{color:#a72e3f}a{color:var(--accent);font-weight:800;text-decoration:none}
  </style>
</head>
<body>
  <main class="card">
    <h1>Yeni şifre belirle</h1>
    <p>Yeni şifren en az 6 karakter olsun. Linkin süresi dolduysa “Şifremi unuttum”dan tekrar link iste.</p>
    <form id="form">
      <input id="password" type="password" placeholder="Yeni şifre" autocomplete="new-password" minlength="6" required />
      <input id="password2" type="password" placeholder="Yeni şifre tekrar" autocomplete="new-password" minlength="6" required />
      <button type="submit">Şifreyi yenile</button>
    </form>
    <div id="msg" class="msg"></div>
    <p><a href="/app/">Müşteri app’e dön</a></p>
  </main>
  <script>
    const token = new URLSearchParams(location.search).get('token') || '';
    const msg = document.getElementById('msg');
    if (!token) {
      msg.textContent = 'Şifre yenileme linki eksik veya hatalı.';
      msg.className = 'msg err';
    }
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      if (password !== password2) {
        msg.textContent = 'Şifreler aynı değil.';
        msg.className = 'msg err';
        return;
      }
      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'İşlem başarısız.');
        msg.textContent = data.message || 'Şifren yenilendi. Yeni şifrenle giriş yapabilirsin.';
        msg.className = 'msg ok';
      } catch (err) {
        msg.textContent = err.message;
        msg.className = 'msg err';
      }
    });
  </script>
</body>
</html>
